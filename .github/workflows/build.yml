name: Build & Release

on:
  push:
    branches: [ "main", "refactor/v2-alpha" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "refactor/v2-alpha" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get Version
        id: version
        run: |
          echo "VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d'"' -f2)" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION_NAME }}"
          NOTES=$(git log -1 --pretty=format:"%s")
          LOG=$(git log --oneline --no-decorate -5)

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, updating assets..."
            gh release upload "$TAG" app/build/outputs/apk/release/*.apk --clobber
          else
            echo "Creating new release $TAG..."
            gh release create "$TAG" app/build/outputs/apk/release/*.apk \
              --title "Release $TAG" \
              --notes "## 变更内容"$'\n\n'"$NOTES"$'\n\n'"$LOG" \
              --target "${{ github.sha }}"
          fi
