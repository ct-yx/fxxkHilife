name: Build & Release

on:
  push:
    branches: [ "main", "refactor/v2-alpha" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "refactor/v2-alpha" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d'"' -f2)
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oE '[0-9]+')
          TAG="v${VERSION_NAME}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "${TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version ${TAG}" >&2
            exit 1
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --stacktrace

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No release APK found" >&2
            exit 1
          fi
          OUT="fxxkHilife-${TAG}-${VERSION_CODE}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fxxkHilife-${{ steps.version.outputs.tag }}-${{ steps.version.outputs.version_code }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        shell: bash
        run: |
          awk -v tag="$TAG" '
            $0 ~ "^## " tag " " { capture=1; print; next }
            capture && $0 ~ "^## " { exit }
            capture { print }
          ' DEVELOPMENT_LOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            {
              echo "## $TAG"
              echo
              git log -1 --pretty=format:%s
              echo
            } > release_notes.md
          fi

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, updating assets..."
            gh release upload "$TAG" "${{ steps.apk.outputs.path }}" --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" "${{ steps.apk.outputs.path }}" \
              --title "Release $TAG" \
              --notes-file release_notes.md \
              --target "${{ github.sha }}"
          fi
