name: Build & Release

on:
  push:
    branches: [ "refactor/v2-alpha" ]
  pull_request:
    branches: [ "refactor/v2-alpha" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: android-actions/setup-android@v3

      - name: Build
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          chmod +x gradlew
          echo "VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d'"' -f2)" >> $GITHUB_ENV
          ./gradlew clean assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app/build/outputs/apk/**/*.apk

      - name: Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION_NAME }}"
          NOTES=$(git log -1 --pretty=format:"%s" | sed 's/^feat:/## 新功能/;s/^fix:/## 修复/;s/^refactor:/## 重构/;s/^chore:/## 杂项/')
          LOG=$(git log --oneline --no-decorate HEAD~10..HEAD 2>/dev/null || git log --oneline --no-decorate -5)
          gh release create "$TAG" app/build/outputs/apk/**/*.apk \
            --title "$TAG" --notes "$NOTES"$'\n\n'"$LOG" \
            --target "${{ github.sha }}" || echo "Release $TAG exists, skipping"
