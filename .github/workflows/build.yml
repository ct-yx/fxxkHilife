name: Build & Release APK

on:
  push:
    branches: [ "refactor/v2-alpha" ]
  pull_request:
    branches: [ "refactor/v2-alpha" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Extract version name
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d'"' -f2)
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION_NAME }}"
          NOTES=$(git log -1 --pretty=format:"%s" | sed 's/^feat:/## 新功能/;s/^fix:/## 修复/;s/^refactor:/## 重构/;s/^chore:/## 杂项/')
          CHANGELOG=$(git log --oneline --no-decorate HEAD~10..HEAD 2>/dev/null || git log --oneline --no-decorate -5)
          BODY="$NOTES"$'\n\n'"$CHANGELOG"
          gh release create "$TAG" \
            app/build/outputs/apk/debug/*.apk \
            app/build/outputs/apk/release/*.apk \
            --title "$TAG" \
            --notes "$BODY" \
            --target "${{ github.sha }}" || echo "Release $TAG already exists, skipping"
