name: Android CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    # Fix: Replace China mirror Maven repos with official repos for CI runners (non-China region)
    - name: Patch settings.gradle.kts for CI environment
      run: |
        sed -i '/maven.*aliyun/d; /maven.*huaweicloud/d' settings.gradle.kts

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v5
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # Generate debug keystore (ignored by .gitignore, needed for Release signing)
    - name: Generate debug keystore for Release signing
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -alias androiddebugkey -keyalg RSA -keysize 2048 \
          -validity 10000 -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

    - name: Upload Release APK
      uses: actions/upload-artifact@v5
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 7
