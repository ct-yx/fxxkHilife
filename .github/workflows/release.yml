name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    # Fix: Remove China mirror Maven repos for CI (non-China region)
    - name: Patch settings.gradle.kts for CI environment
      run: |
        sed -i '/maven.*aliyun/d; /maven.*huaweicloud/d' settings.gradle.kts

    - name: Grant execute permission
      run: chmod +x gradlew

    # Generate debug keystore (ignored by .gitignore, needed for Release signing)
    - name: Generate debug keystore for Release signing
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -alias androiddebugkey -keyalg RSA -keysize 2048 \
          -validity 10000 -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Release APK
      run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/app-release.apk
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
